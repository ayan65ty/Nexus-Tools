<!DOCTYPE html>
<html>
<head>
    <title>Scanner Tools</title>

    <style>
        body{
            margin:0;
            padding:40px;
            font-family:Arial;
            background:#f7f9fc;
            text-align:center;
        }

        h1{
            font-size:50px;
            color:#ff7a00;
            margin-bottom:30px;
        }

        .tool{
            background:white;
            width:500px;
            margin:25px auto;
            padding:35px;
            border-radius:20px;
            box-shadow:0 8px 25px rgba(0,0,0,0.08);
        }

        h2{
            margin-bottom:15px;
        }

        input{
            width:100%;
            padding:12px;
            border-radius:10px;
            border:1px solid #ccc;
        }

        button{
            padding:15px 30px;
            border:none;
            border-radius:12px;
            background:linear-gradient(135deg,#ff7a00,#ff3d00);
            color:white;
            font-size:18px;
            cursor:pointer;
            margin-top:15px;
            transition:0.3s;
        }

        button:hover{
            transform:scale(1.05);
        }
    </style>
</head>

<body>

<h1>Scanner Tools 📷</h1>

<!-- SCAN DOCUMENT -->
<div class="tool">
    <h2>Scan Document</h2>

    <form action="/scan-document" method="POST" enctype="multipart/form-data">
        <input type="file" name="image" accept="image/*" capture="environment" required>
        <button type="submit">Scan Document</button>
    </form>
</div>

<!-- IMAGE TO PDF -->
<div class="tool">
    <h2>Image to PDF</h2>

    <form action="/image-to-pdf" method="POST" enctype="multipart/form-data">
        <input type="file" name="image" accept="image/*" required>
        <button type="submit">Convert to PDF</button>
    </form>
</div>

<!-- ID CARD SCANNER -->
<div class="tool">
    <h2>ID Card Scanner</h2>

    <form action="/id-card-scanner" method="POST" enctype="multipart/form-data">
        <input type="file" name="image" accept="image/*" capture="environment" required>
        <button type="submit">Scan ID Card</button>
    </form>
</div>

</body>
</html>
