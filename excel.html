<!DOCTYPE html>
<html>
<head>
    <title>Excel Tools</title>

    <style>
        body{
            margin:0;
            padding:40px;
            font-family:Arial;
            background:#f7f9fc;
            text-align:center;
        }

        h1{
            font-size:50px;
            color:#ff7a00;
            margin-bottom:30px;
        }

        .tool{
            background:white;
            width:500px;
            margin:25px auto;
            padding:35px;
            border-radius:20px;
            box-shadow:0 8px 25px rgba(0,0,0,0.08);
        }

        h2{
            margin-bottom:15px;
        }

        input{
            width:100%;
            padding:12px;
            border-radius:10px;
            border:1px solid #ccc;
            margin-bottom:10px;
        }

        button{
            padding:15px 30px;
            border:none;
            border-radius:12px;
            background:linear-gradient(135deg,#ff7a00,#ff3d00);
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:scale(1.05);
        }
    </style>
</head>

<body>

<h1>Excel Tools 📊</h1>

<!-- CSV TO EXCEL -->
<div class="tool">
    <h2>CSV → Excel</h2>

    <form action="/csv-to-excel" method="POST" enctype="multipart/form-data">
        <input type="file" name="csv" accept=".csv" required>
        <button type="submit">Convert</button>
    </form>
</div>

<!-- EXCEL TO PDF -->
<div class="tool">
    <h2>Excel → PDF</h2>

    <form action="/excel-to-pdf" method="POST" enctype="multipart/form-data">
        <input type="file" name="excel" accept=".xlsx,.xls" required>
        <button type="submit">Convert</button>
    </form>
</div>

<!-- REMOVE DUPLICATES -->
<div class="tool">
    <h2>Remove Duplicates</h2>

    <form action="/remove-duplicates" method="POST" enctype="multipart/form-data">
        <input type="file" name="excel" accept=".xlsx,.xls" required>
        <button type="submit">Clean File</button>
    </form>
</div>

</body>
</html>
