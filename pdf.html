<!DOCTYPE html>
<html>
<head>
    <title>PDF Tools</title>
    <style>
        body{
            margin:0;
            padding:40px;
            font-family:Arial;
            background:#f7f9fc;
            text-align:center;
        }

        h1{
            font-size:55px;
            color:#dc2626;
        }

        .tool{
            background:white;
            width:500px;
            margin:25px auto;
            padding:35px;
            border-radius:20px;
            box-shadow:0 8px 25px rgba(0,0,0,0.08);
        }

        button{
            padding:15px 30px;
            border:none;
            border-radius:12px;
            background:#dc2626;
            color:white;
            font-size:18px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<h1>PDF Tools</h1>

<div class="tool">
    <h2>Merge PDF</h2>

    <form action="/merge-pdf" method="POST" enctype="multipart/form-data">
        <input type="file" name="pdfs" multiple accept=".pdf" required>
        <br><br>
        <button type="submit">Merge PDFs</button>
    </form>
</div>
<div class="tool">
    <h2>Split PDF</h2>

    <form action="/split-pdf" method="POST" enctype="multipart/form-data">
        <input type="file" name="pdf" accept=".pdf" required>
        <br><br>

        <input type="number" name="split_page" placeholder="Split after page..." required>
        <br><br>

        <button type="submit">Split PDF</button>
    </form>
</div>

<div class="tool">
    <h2>Compress PDF</h2>

    <form action="/compress-pdf" method="POST" enctype="multipart/form-data">
        <input type="file" name="pdf" accept=".pdf" required>
        <br><br>
        <button type="submit">Compress PDF</button>
    </form>
</div>

<div class="tool">
    <h2>PDF to Word</h2>

    <form action="/pdf-to-word" method="POST" enctype="multipart/form-data">
        <input type="file" name="pdf" accept=".pdf" required>
        <br><br>
        <button type="submit">Convert to Word</button>
    </form>
</div>
</body>
</html>
